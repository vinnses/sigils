# pamusb: allow keyring unlock operations without password prompt
# Generated by pamusb setup — do not edit manually
# Validate with: visudo -cf /etc/sudoers.d/99-pamusb

{{USERNAME}} ALL=(root) NOPASSWD: /usr/sbin/cryptsetup luksOpen /dev/disk/by-uuid/{{LUKS_UUID}} {{MAPPER_NAME}} --key-file {{KEYFILE_PATH}}
{{USERNAME}} ALL=(root) NOPASSWD: /usr/sbin/cryptsetup luksClose {{MAPPER_NAME}}
{{USERNAME}} ALL=(root) NOPASSWD: /usr/bin/mount /dev/mapper/{{MAPPER_NAME}} /run/user/{{UID}}/usb-secret
{{USERNAME}} ALL=(root) NOPASSWD: /usr/bin/umount /run/user/{{UID}}/usb-secret
