# zotcli default configuration
# This file is committed to git. Do NOT edit — use config/zotcli.yaml for overrides.

# Display
ls:
  default_sort: name       # name | date | type | creator
  sort_reverse: false
  default_fields: label,type,meta  # label | title | citation_key (ck) | author | year | type | meta | key

# Export
get:
  default_format: bibtex   # bibtex | json | bib
  bib_style: apa           # any CSL style name

# Cache
cache:
  ttl_seconds: 3600        # 1 hour

# Visual mode
visual:
  auto: true               # auto-activate on navigation commands (cd)
  color: cyan              # cyan | green | yellow | red | blue | magenta | white | bright_*
  show_sync_age: true      # show sync age footer in listings

# Local SQLite database
db:
  path: null               # null = data/zotcli.db (relative to SPELL_DIR)

# Sync / mutation queue
sync:
  background: false        # spawn detached process for API flush (true = non-blocking)
  max_retries: 3           # retry failed mutations up to N times before marking 'error'

# Metadata editor (edit command)
edit:
  format: yaml             # yaml | json (temp file format for $EDITOR)
